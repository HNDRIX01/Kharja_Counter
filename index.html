<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple counter with a shared 5-minute cooldown." />
    <title>Mawdhou3 N# Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-labelledby="title">
        <p class="eyebrow">Simple counter</p>
        <h1 id="title">Mawdhou3 N# <span id="counter">40</span> Kifech nokhrjou men tounes</h1>

        <button id="incrementBtn" class="button" type="button">
          Add +1
        </button>

        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
